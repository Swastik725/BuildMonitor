version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buildmonitor
      POSTGRES_PASSWORD: buildmonitor
      POSTGRES_DB: buildmonitor
    ports:
      - "5432:5432"
    volumes:
      - buildmonitor_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - buildmonitor_redis_data:/data

volumes:
  buildmonitor_pg_data:
  buildmonitor_redis_data:
